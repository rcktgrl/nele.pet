<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Puppy Pillow Fortress – Bone Dash</title>
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="background-canvas" aria-hidden="true"></div>
  <main class="game-shell">
    <header class="game-header">
      <a class="link-button" href="../index.html">⬅ Back Home</a>
      <h1>🎮 Bone Dash</h1>
      <p>Use <strong>←</strong> and <strong>→</strong> to catch bones and dodge the squeaky toys!</p>
    </header>

    <section class="hud" aria-live="polite">
      <p>Score: <span id="score">0</span></p>
      <p>Lives: <span id="lives">3</span></p>
      <button id="restart" type="button">Restart</button>
    </section>

    <section class="game-board-wrap">
      <canvas id="game-board" width="640" height="420" aria-label="Bone Dash game area"></canvas>
    </section>
  </main>

  <script>
    const canvas = document.getElementById('game-board');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('score');
    const livesEl = document.getElementById('lives');
    const restartButton = document.getElementById('restart');

    const state = {
      playerX: canvas.width / 2 - 40,
      playerWidth: 80,
      playerHeight: 20,
      itemSize: 24,
      items: [],
      score: 0,
      lives: 3,
      gameOver: false,
      leftPressed: false,
      rightPressed: false,
      spawnTick: 0,
      speed: 2.2
    };

    function spawnItem() {
      const kind = Math.random() < 0.72 ? 'bone' : 'toy';
      state.items.push({
        x: Math.random() * (canvas.width - state.itemSize),
        y: -state.itemSize,
        kind,
        speed: state.speed + Math.random() * 1.5
      });
    }

    function drawPlayer() {
      ctx.fillStyle = '#ffe9ff';
      ctx.fillRect(state.playerX, canvas.height - 32, state.playerWidth, state.playerHeight);
      ctx.fillStyle = '#8f47df';
      ctx.fillRect(state.playerX + 8, canvas.height - 26, state.playerWidth - 16, 8);
    }

    function drawItem(item) {
      ctx.font = '22px sans-serif';
      ctx.fillText(item.kind === 'bone' ? '🦴' : '🧸', item.x, item.y);
    }

    function update() {
      if (state.gameOver) {
        return;
      }

      if (state.leftPressed) {
        state.playerX -= 6;
      }
      if (state.rightPressed) {
        state.playerX += 6;
      }
      state.playerX = Math.max(0, Math.min(canvas.width - state.playerWidth, state.playerX));

      state.spawnTick += 1;
      if (state.spawnTick > 36) {
        spawnItem();
        state.spawnTick = 0;
      }

      state.items.forEach((item) => {
        item.y += item.speed;
      });

      const playerTop = canvas.height - 32;
      state.items = state.items.filter((item) => {
        const hitPlayer = item.y > playerTop && item.y < canvas.height - 8 && item.x + state.itemSize > state.playerX && item.x < state.playerX + state.playerWidth;

        if (hitPlayer) {
          if (item.kind === 'bone') {
            state.score += 1;
            scoreEl.textContent = String(state.score);
            if (state.score % 7 === 0) {
              state.speed += 0.25;
            }
          } else {
            state.lives -= 1;
            livesEl.textContent = String(state.lives);
          }
          return false;
        }

        if (item.y > canvas.height + 30) {
          if (item.kind === 'bone') {
            state.lives -= 1;
            livesEl.textContent = String(state.lives);
          }
          return false;
        }

        return true;
      });

      if (state.lives <= 0) {
        state.gameOver = true;
      }
    }

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = 'rgba(33, 8, 66, 0.92)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      state.items.forEach(drawItem);
      drawPlayer();

      if (state.gameOver) {
        ctx.fillStyle = '#fef0ff';
        ctx.font = 'bold 32px sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText('Game Over', canvas.width / 2, canvas.height / 2 - 8);
        ctx.font = '20px sans-serif';
        ctx.fillText(`Final score: ${state.score}`, canvas.width / 2, canvas.height / 2 + 26);
      }
    }

    function loop() {
      update();
      draw();
      requestAnimationFrame(loop);
    }

    function resetGame() {
      state.playerX = canvas.width / 2 - 40;
      state.items = [];
      state.score = 0;
      state.lives = 3;
      state.speed = 2.2;
      state.spawnTick = 0;
      state.gameOver = false;
      scoreEl.textContent = '0';
      livesEl.textContent = '3';
    }

    document.addEventListener('keydown', (event) => {
      if (event.key === 'ArrowLeft') state.leftPressed = true;
      if (event.key === 'ArrowRight') state.rightPressed = true;
    });

    document.addEventListener('keyup', (event) => {
      if (event.key === 'ArrowLeft') state.leftPressed = false;
      if (event.key === 'ArrowRight') state.rightPressed = false;
    });

    restartButton.addEventListener('click', resetGame);

    resetGame();
    loop();
  </script>
</body>
</html>
