<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#080b18">
  <meta name="color-scheme" content="dark">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Bomber — Arcade</title>
  <link rel="stylesheet" href="styles/bomberman.css">
</head>
<body>

  <!-- ── Lobby ──────────────────────────────────────────────────────────────── -->
  <div id="lobby-section" class="screen active">

    <div class="lobby-top">
      <h1>💣 Bomber</h1>
      <div class="room-header">
        <div class="room-code-block">
          <span class="room-label">Room</span>
          <span id="room-code-display" class="room-code" title="Click to copy"></span>
          <span id="private-badge" class="private-badge hidden">Private</span>
        </div>
        <button id="copy-link-btn" class="btn small">🔗 Copy link</button>
      </div>
    </div>

    <!-- Player roster — built dynamically from the host-authoritative roster -->
    <div id="player-slots" class="player-slots"></div>

    <!-- Complexity selector — shown only to host via JS -->
    <div id="complexity-row" class="complexity-row hidden">
      <span class="complexity-label">🗺 Map size:</span>
      <select id="complexity-select" class="complexity-select">
        <option value="0">Normal · 15×13</option>
        <option value="1">Large · 21×17</option>
        <option value="2">Huge · 27×21</option>
      </select>
    </div>

    <p id="lobby-msg" class="lobby-msg"></p>

    <div class="lobby-actions">
      <button id="back-btn" class="btn">← Back</button>
      <button id="start-btn" class="btn primary" disabled>▶ Start Game</button>
    </div>

    <!-- Session leaderboard — hidden until at least one game is played -->
    <div id="session-lb" class="leaderboard hidden">
      <div class="lb-title">🏆 Session Scores</div>
      <table id="session-lb-table" class="lb-table"></table>
    </div>

    <!-- Global leaderboard — loaded from Supabase -->
    <div id="global-lb" class="leaderboard">
      <div class="lb-title">🌐 Global Leaderboard</div>
      <div id="global-lb-content" class="lb-loading">Loading…</div>
    </div>

  </div>

  <!-- ── Game ───────────────────────────────────────────────────────────────── -->
  <div id="game-section" class="screen hidden">
    <div id="game-header">
      <div id="player-stats"></div>
    </div>
    <canvas id="game-canvas"></canvas>

    <!-- Touch controls (works for both touch screens and mouse) -->
    <div id="touch-controls">
      <div class="touch-dpad">
        <div class="dpad-row">
          <button class="touch-btn dpad-btn" id="touch-up">▲</button>
        </div>
        <div class="dpad-row">
          <button class="touch-btn dpad-btn" id="touch-left">◀</button>
          <div class="dpad-center"></div>
          <button class="touch-btn dpad-btn" id="touch-right">▶</button>
        </div>
        <div class="dpad-row">
          <button class="touch-btn dpad-btn" id="touch-down">▼</button>
        </div>
      </div>
      <div class="touch-actions">
        <button class="touch-btn action-btn special-btn" id="touch-special">⚡<span class="touch-label">Special</span></button>
        <button class="touch-btn action-btn bomb-btn" id="touch-bomb">💣<span class="touch-label">Bomb</span></button>
      </div>
    </div>

    <p class="controls-hint">
      WASD / Arrows — 1 tile per press &nbsp;·&nbsp;
      Space / F — bomb &nbsp;·&nbsp;
      Q — special bomb
    </p>
  </div>

  <!-- ── Result ─────────────────────────────────────────────────────────────── -->
  <div id="result-section" class="screen hidden">
    <h2 id="result-title"></h2>
    <p id="result-subtitle"></p>
    <div id="result-scores" class="result-scores"></div>
    <div class="result-actions">
      <!-- Host-only: start a new round or drop back to the lobby -->
      <button id="play-again-btn" class="btn primary hidden">▶ Play Again</button>
      <button id="back-to-lobby-btn" class="btn hidden">← Back to Lobby</button>
      <!-- Everyone else: only leave to the title screen -->
      <button id="leave-title-btn" class="btn hidden">← Leave to Title</button>
    </div>
  </div>

  <script type="module" src="scripts/lobby.js"></script>
</body>
</html>
