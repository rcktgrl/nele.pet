<!doctype html>
<html><body><pre id="out"></pre>
<script type="module">
window.__lines = [];
window.__done = null;
const w = new Worker('./test-worker.js', { type: 'module' });
w.onmessage = e => {
  if (e.data.log) { window.__lines.push(e.data.log); document.getElementById('out').textContent += e.data.log + '\n'; }
  if (e.data.done) window.__done = e.data;
};
w.onerror = e => { window.__lines.push('WORKER ERROR: ' + e.message); window.__done = { ok: false, why: 'worker error: ' + e.message }; };
</script></body></html>
